# =============================================================================
# nginx reverse proxy — production stack for IHRAUTO CRM
# =============================================================================
# Sits in front of the 3 `web` replicas, terminates TLS, load-balances
# requests, and streams static assets from the build dir. Docker compose
# resolves the `web` service name to all replicas via its internal DNS;
# nginx's `upstream` block uses that for least-connections balancing.
# =============================================================================

worker_processes auto;
worker_rlimit_nofile 8192;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;  # don't advertise nginx version

    # Logging — stdout so the container collector picks it up.
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time urt=$upstream_response_time';
    access_log /dev/stdout main;
    error_log  /dev/stderr warn;

    # Sensible defaults.
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 100;
    client_max_body_size 20M;  # matches docker/php.ini upload_max_filesize

    # Gzip on text responses. Static build assets already come pre-gzipped
    # by Vite where possible; gzip here covers dynamic HTML.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               application/xml+rss application/atom+xml image/svg+xml;

    # ---------------------------------------------------------------------
    # Upstream — all web replicas. Docker's DNS returns every replica IP,
    # nginx's `least_conn` picks the one with fewest active requests.
    # ---------------------------------------------------------------------
    upstream ihrauto_web {
        least_conn;
        server web:80 max_fails=3 fail_timeout=30s;
        # Additional replicas are auto-discovered via the docker DNS round
        # robin; for traffic above ~30 req/s consider a dedicated service
        # discovery layer (Consul/etcd).
        keepalive 32;
    }

    # ---------------------------------------------------------------------
    # Redirect HTTP → HTTPS (after TLS cert is installed).
    # ---------------------------------------------------------------------
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Health probe bypasses the HTTPS redirect so orchestrators can
        # verify container readiness on plain HTTP.
        location = /up {
            proxy_pass http://ihrauto_web;
            proxy_set_header Host $host;
        }

        return 301 https://$host$request_uri;
    }

    # ---------------------------------------------------------------------
    # TLS endpoint. Comment out when running without certs (e.g. in local
    # compose dev) and swap the HTTP server block above to a forwarder.
    # ---------------------------------------------------------------------
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # HSTS — match Laravel's own SecurityHeaders middleware.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Main pass-through.
        location / {
            proxy_pass http://ihrauto_web;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }
    }
}
