; PgBouncer configuration for IHRAUTO CRM production deployment
;
; WHY:
;   At 200 tenants, Apache mpm_prefork (25 workers) × 3 web containers =
;   75 permanent PG connections. Plus queue workers (3) + scheduler (1) +
;   backup runner (1). That's 80+ connections just at idle. Burst traffic
;   pushes it past PG's 100-connection cap.
;
;   PgBouncer sits in front of PG and pools connections at the statement
;   boundary. Applications see "unlimited" connections; PG only sees the
;   true backend pool (default 20).
;
; DEPLOY:
;   - Runs as a sidecar container next to PG (or on a separate small instance).
;   - Expose port 6432 to the app containers; app connects to pgbouncer
;     instead of PG directly (DB_HOST=pgbouncer, DB_PORT=6432).
;   - DO NOT expose pgbouncer publicly — it's an internal network service.

[databases]
; Route everything under one logical DB. In multi-app setups you'd list
; each DB separately. `ihrauto_crm` matches the DB created on PG itself.
ihrauto_crm = host=%(DB_HOST)s port=%(DB_PORT)s dbname=ihrauto_crm

[pgbouncer]
; Listen on all interfaces inside the container network. Security is
; handled by the orchestrator's network policies — never expose 6432
; to the public internet.
listen_addr = 0.0.0.0
listen_port = 6432

; Transaction-level pooling. Each transaction gets a backend connection,
; returned to the pool on COMMIT/ROLLBACK. This is the standard mode for
; Laravel — session pooling would work but wastes connections. Statement
; pooling breaks Laravel's transactions outright.
pool_mode = transaction

; Auth. We use SCRAM-SHA-256 passthrough — pgbouncer doesn't store
; plaintext; it just forwards the SCRAM exchange to PG.
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

; Pool sizes — tuned for ~80 client connections at 200 tenants.
; default_pool_size = max backend connections per database/user pair.
; Keep below PG's max_connections leaving headroom for superuser tasks.
default_pool_size = 25
reserve_pool_size = 5
reserve_pool_timeout = 3
max_client_conn = 500

; Server / client timeouts. Short idle timeouts free connections faster
; under pressure. query_timeout kills any runaway statement so one bad
; query can't hog the pool.
server_idle_timeout = 240
server_lifetime = 3600
client_idle_timeout = 0
query_timeout = 120

; Logging — route to stdout so container log aggregation picks it up.
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
verbose = 0

; Administration — lock the admin console to the unix socket so nobody
; can reconfigure PgBouncer over the network.
admin_users = postgres
stats_users = monitor

; TLS. When connecting app → pgbouncer, we keep TLS on because the
; connection still crosses a network boundary. pgbouncer → PG is
; already TLS because we set sslmode=require at the PG level.
client_tls_sslmode = prefer
client_tls_cert_file = /etc/pgbouncer/client.crt
client_tls_key_file = /etc/pgbouncer/client.key
server_tls_sslmode = require
