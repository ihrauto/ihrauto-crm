; =============================================================================
; REFERENCE DOCUMENTATION — not consumed at runtime
; =============================================================================
; The docker-compose `pgbouncer` service uses the edoburu/pgbouncer image,
; which generates its config (including userlist.txt) from environment
; variables at startup. This ini file is kept as a single-source reference
; for the settings we enable and WHY — so an operator reviewing the stack
; doesn't have to diff env vars against pgbouncer's docs.
;
; If you ever switch to a plain pgbouncer container that mounts a config
; file, start from this ini as a baseline. All settings below are mirrored
; in docker-compose.yml as POOL_MODE / DEFAULT_POOL_SIZE / etc. env vars.
;
; Bug review OPS-02: removed TLS cert references that referenced files
; nothing provisioned. Pgbouncer → postgres traffic is on an isolated
; docker network; app → pgbouncer is the same network. No TLS cert files
; are needed for this topology.
; =============================================================================

[databases]
; Route everything under one logical DB. The edoburu image auto-creates
; this entry from DB_NAME / DB_HOST / DB_PORT / DB_USER env vars.
ihrauto_crm = host=%(DB_HOST)s port=%(DB_PORT)s dbname=ihrauto_crm

[pgbouncer]
; Listen on all interfaces inside the container network. Security is
; handled by docker's network isolation — the pgbouncer service is only
; reachable from containers on the `ihrauto` network.
listen_addr = 0.0.0.0
listen_port = 6432

; Transaction-level pooling. Each transaction gets a backend connection,
; returned to the pool on COMMIT/ROLLBACK. Standard for Laravel — session
; pooling wastes connections, statement pooling breaks transactions.
pool_mode = transaction

; Auth — edoburu image auto-generates userlist.txt from DB_USER +
; DB_PASSWORD at container start, so we never have to provision this file
; manually (OPS-02 fix).
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

; Pool sizes — tuned for ~80 client connections at 200 tenants.
default_pool_size = 25
reserve_pool_size = 5
reserve_pool_timeout = 3
max_client_conn = 500

; Server / client timeouts.
server_idle_timeout = 240
server_lifetime = 3600
client_idle_timeout = 0
query_timeout = 120

; Logging — stdout so container log aggregation picks it up.
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
verbose = 0

; Administration — stats_users can read pool metrics over the admin port.
admin_users = postgres
stats_users = monitor
