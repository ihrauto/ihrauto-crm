; D-12 — production PHP tuning.
;
; Baked into the Docker image via the runtime stage. Overrides the stock
; php.ini that ships with php:8.4-apache. If you need to tweak values per
; environment, copy to $PHP_INI_DIR/conf.d/ at container start instead.

; Moderately generous memory ceiling for backup/export/CSV batch jobs
; while still catching runaway scripts.
memory_limit = 256M

; Keep upload sizes modest; workshop photos go through WorkOrderPhotoController
; which already enforces 5 MiB per file.
post_max_size = 20M
upload_max_filesize = 10M

; Long enough for heavy finance report queries, short enough that a stuck
; request does not hold an Apache worker forever.
max_execution_time = 60
max_input_time = 60

; Session & security baseline.
session.cookie_httponly = 1
session.cookie_samesite = "Lax"
session.use_strict_mode = 1
expose_php = Off

; -----------------------------------------------------------------------------
; OPcache (production profile)
; -----------------------------------------------------------------------------
; With validate_timestamps=0 we never re-stat files — the image is immutable
; at runtime, so this avoids needless syscalls on every request. If a deploy
; needs to hot-reload code, the container is redeployed anyway.
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
opcache.save_comments = 1
opcache.jit_buffer_size = 64M
opcache.jit = tracing

; Preload Laravel core here later if needed — requires a bootstrap script
; that is read-only and accessible to every FPM worker.

; -----------------------------------------------------------------------------
; Realpath cache — speeds up `include` / `require` path resolution.
; -----------------------------------------------------------------------------
realpath_cache_size = 4096K
realpath_cache_ttl = 600
