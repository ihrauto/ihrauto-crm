# =============================================================================
# Render Blueprint — IHRAUTO CRM
# =============================================================================
# Provisioned for the 200-tenant scalability target (see
# docs/SCALABILITY-REVIEW-2026-04-23.md):
#   - 3× web containers behind Render's load balancer
#   - Dedicated backup-runner (isolates 30-min nightly DB dump)
#   - PostgreSQL `standard` (200 connections, 10 GB storage)
#   - Redis `standard` (5 GB)
#   - Sessions on Redis, cache + queue on Redis
#   - onOneServer() guards on every scheduled command (routes/console.php)
#
# Each `sync: false` entry means the secret is configured in the Render
# dashboard, not checked in here.
# =============================================================================

services:
  - type: web
    name: ihrauto-crm
    env: docker
    # Scalability C-1: `standard` (1 vCPU / 1 GB) × 3 instances to handle
    # ~100 req/s peak at 200 tenants. Upgrade to `standard-2x` before
    # 500 tenants.
    plan: standard
    region: frankfurt
    branch: main
    numInstances: 3
    healthCheckPath: /up
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      # Scalability B-6: 3 queue workers per container = 9 total workers
      # across the fleet. Overrides the Dockerfile default.
      - key: QUEUE_WORKERS
        value: "3"
      # --- Database ---
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: ihrauto-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: ihrauto-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: ihrauto-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: ihrauto-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: ihrauto-db
          property: password
      # Scalability H-9: log slow queries so we can diagnose at scale.
      - key: DB_SLOW_QUERY_LOG_MS
        value: "500"
      - key: DB_APP_NAME
        value: ihrauto-crm-web
      # --- Session & Security ---
      # Scalability B-1: Redis session store. `database` becomes a lock-
      # contention hotspot at 200 tenants (every request writes a row).
      - key: SESSION_DRIVER
        value: redis
      - key: SESSION_ENCRYPT
        value: "true"
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: AUTO_LOGIN_ENABLED
        value: "false"
      # --- Cache / Queue ---
      - key: CACHE_STORE
        value: redis
      - key: QUEUE_CONNECTION
        value: redis
      - key: REDIS_CLIENT
        value: phpredis
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: ihrauto-redis
          property: connectionString
      # --- CORS ---
      - key: CORS_ALLOWED_ORIGINS
        sync: false  # Set to your frontend domain(s) in Render dashboard
      # --- Billing / Support ---
      - key: CRM_SUPPORT_EMAIL
        value: info@ihrauto.ch
      - key: CRM_SUPPORT_PHONE
        sync: false
      # --- Email (Resend) ---
      - key: MAIL_MAILER
        value: resend
      - key: RESEND_API_KEY
        sync: false  # Set this secret in Render dashboard
      - key: MAIL_FROM_ADDRESS
        value: noreply@ihrauto.ch
      - key: MAIL_FROM_NAME
        value: IHRAUTO CRM
      # --- Backup Notifications ---
      - key: BACKUP_NOTIFICATION_EMAIL
        value: info@ihrauto.ch
      - key: BACKUP_DESTINATION_DISK
        value: backups
      - key: BACKUP_FILESYSTEM_DRIVER
        value: s3
      - key: BACKUP_FILESYSTEM_KEY
        sync: false
      - key: BACKUP_FILESYSTEM_SECRET
        sync: false
      - key: BACKUP_FILESYSTEM_REGION
        sync: false
      - key: BACKUP_FILESYSTEM_BUCKET
        sync: false
      - key: BACKUP_FILESYSTEM_ENDPOINT
        sync: false
      - key: BACKUP_FILESYSTEM_URL
        sync: false
      - key: BACKUP_FILESYSTEM_ROOT
        value: backups
      # --- Public File Storage ---
      - key: FILESYSTEM_DISK
        value: public
      - key: PUBLIC_FILESYSTEM_DRIVER
        value: s3
      - key: PUBLIC_FILESYSTEM_KEY
        sync: false
      - key: PUBLIC_FILESYSTEM_SECRET
        sync: false
      - key: PUBLIC_FILESYSTEM_REGION
        sync: false
      - key: PUBLIC_FILESYSTEM_BUCKET
        sync: false
      - key: PUBLIC_FILESYSTEM_ENDPOINT
        sync: false
      - key: PUBLIC_FILESYSTEM_URL
        sync: false
      - key: PUBLIC_FILESYSTEM_ROOT
        value: public
      # --- Google OAuth ---
      - key: GOOGLE_CLIENT_ID
        sync: false  # Set in Render dashboard
      - key: GOOGLE_CLIENT_SECRET
        sync: false  # Set in Render dashboard
      - key: GOOGLE_REDIRECT_URL
        sync: false  # Set to https://your-domain/auth/google/callback
      # --- Monitoring ---
      # --- CDN (optional) ---
      - key: ASSET_URL
        sync: false  # Set to CDN URL (e.g. https://cdn.ihrauto.ch) if using a CDN
      # --- Monitoring ---
      - key: SENTRY_LARAVEL_DSN
        sync: false  # Set in Render dashboard
      - key: SENTRY_RELEASE
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: production
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0.2"
      # --- Super Admin (REQUIRED for initial seeding) ---
      - key: SUPERADMIN_EMAIL
        value: info@ihrauto.ch
      - key: SUPERADMIN_NAME
        value: Platform Owner
      - key: SUPERADMIN_PASSWORD
        sync: false  # Set this secret in Render dashboard

  # =========================================================================
  # BACKUP RUNNER — dedicated small instance that runs scheduled DB backups
  # Scalability C-6: isolates the 10–30 min nightly pg_dump from user-
  # facing containers. If backup hangs, web stays fully responsive.
  # =========================================================================
  - type: worker
    name: ihrauto-backup-runner
    env: docker
    plan: starter
    region: frankfurt
    branch: main
    dockerCommand: sh -lc 'php /var/www/html/artisan schedule:work --verbose --no-interaction'
    envVars:
      - key: APP_KEY
        fromService:
          type: web
          name: ihrauto-crm
          envVarKey: APP_KEY
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: ihrauto-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: ihrauto-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: ihrauto-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: ihrauto-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: ihrauto-db
          property: password
      - key: DB_APP_NAME
        value: ihrauto-crm-backup
      - key: CACHE_STORE
        value: redis
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: ihrauto-redis
          property: connectionString
      - key: BACKUP_DESTINATION_DISK
        value: backups
      - key: BACKUP_FILESYSTEM_DRIVER
        value: s3
      - key: BACKUP_FILESYSTEM_KEY
        sync: false
      - key: BACKUP_FILESYSTEM_SECRET
        sync: false
      - key: BACKUP_FILESYSTEM_REGION
        sync: false
      - key: BACKUP_FILESYSTEM_BUCKET
        sync: false
      - key: BACKUP_FILESYSTEM_ROOT
        value: backups
      - key: BACKUP_NOTIFICATION_EMAIL
        value: info@ihrauto.ch
      # Only the scheduler runs here — no queue worker, no Apache.
      - key: QUEUE_WORKERS
        value: "0"

  # =========================================================================
  # STAGING — deploys from 'staging' branch with separate DB/Redis
  # =========================================================================
  - type: web
    name: ihrauto-crm-staging
    env: docker
    plan: starter
    region: frankfurt
    branch: staging
    numInstances: 1
    healthCheckPath: /up
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: APP_ENV
        value: staging
      - key: APP_DEBUG
        value: "true"
      - key: APP_URL
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: debug
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: ihrauto-db-staging
          property: host
      - key: DB_PORT
        fromDatabase:
          name: ihrauto-db-staging
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: ihrauto-db-staging
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: ihrauto-db-staging
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: ihrauto-db-staging
          property: password
      - key: SESSION_DRIVER
        value: database
      - key: AUTO_LOGIN_ENABLED
        value: "true"
      - key: CACHE_STORE
        value: redis
      - key: QUEUE_CONNECTION
        value: redis
      - key: REDIS_CLIENT
        value: phpredis
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: ihrauto-redis-staging
          property: connectionString
      - key: SENTRY_ENVIRONMENT
        value: staging
      - key: SUPERADMIN_EMAIL
        value: info@ihrauto.ch
      - key: SUPERADMIN_NAME
        value: Platform Owner
      - key: SUPERADMIN_PASSWORD
        sync: false

  - type: keyvalue
    name: ihrauto-redis
    # Scalability: `standard` gives us 5 GB — plenty for sessions + cache
    # + rate-limit counters across 200 tenants (est. peak ~100 MB).
    plan: standard
    region: frankfurt
    ipAllowList: []

  - type: keyvalue
    name: ihrauto-redis-staging
    plan: free
    region: frankfurt
    ipAllowList: []

databases:
  - name: ihrauto-db
    databaseName: ihrauto
    user: ihrauto_admin
    # Scalability BL-1: `standard` raises max_connections to 200 and
    # includes an integrated PgBouncer pool. At 200 tenants with 3 web
    # containers × 25 Apache workers + queue/scheduler we peak around
    # 80 backend connections — standard gives 2× headroom.
    plan: standard
    region: frankfurt

  - name: ihrauto-db-staging
    databaseName: ihrauto_staging
    user: ihrauto_staging
    plan: free
    region: frankfurt
